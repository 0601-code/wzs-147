version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radioclub-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - radioclub-network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: radioclub-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - radioclub-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: radioclub-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: radioclub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: radioclub
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - radioclub-network

networks:
  radioclub-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
